<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Assistant</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:#1a1a1a; color:#e0e0e0;
      display:flex; height:100vh; overflow:hidden;
    }

    /* Sidebar */
    #sidebar {
      width:260px; background:#111; display:flex;
      flex-direction:column; padding:12px; gap:8px;
      border-right:1px solid #2a2a2a;
    }
    #newchat {
      background:#2a2a2a; border:1px solid #3a3a3a;
      color:#fff; padding:10px 16px; border-radius:8px;
      cursor:pointer; font-size:14px; text-align:left;
      display:flex; align-items:center; gap:8px;
    }
    #newchat:hover { background:#333; }
    .sidebar-label {
      font-size:11px; color:#666; padding:8px 8px 4px;
      text-transform:uppercase; letter-spacing:0.5px;
    }
    #memoryStatus {
      font-size:12px; padding:8px 10px; border-radius:6px;
      background:#1f1f1f; color:#666; border:1px solid #2a2a2a;
    }
    .memory-on { color:#4ade80 !important; }
    .memory-off { color:#666 !important; }

    #uploadBtn {
      background:#1f1f1f; border:1px solid #2a2a2a;
      color:#aaa; padding:8px 12px; border-radius:8px;
      cursor:pointer; font-size:13px; text-align:left;
      display:flex; align-items:center; gap:8px;
    }
    #uploadBtn:hover { background:#2a2a2a; }
    #fileInput { display:none; }
    #fileStatus {
      font-size:11px; color:#666; padding:4px 8px;
      word-break:break-all;
    }

    /* Main chat area */
    #main {
      flex:1; display:flex; flex-direction:column;
      height:100vh; overflow:hidden;
    }

    #topbar {
      padding:16px 20px; border-bottom:1px solid #2a2a2a;
      display:flex; align-items:center; justify-content:space-between;
    }
    #modelname {
      font-size:14px; color:#aaa;
      display:flex; align-items:center; gap:6px;
    }
    .dot { width:7px; height:7px; border-radius:50%; background:#4ade80; display:inline-block; }

    #messages {
      flex:1; overflow-y:auto; padding:24px 20px;
      display:flex; flex-direction:column; gap:20px;
      scroll-behavior:smooth;
      scroll-behavior:smooth;
      overflow-anchor: none;
    }

    /* Message styles - Claude like */
    .msg-wrapper { display:flex; gap:12px; max-width:800px; margin:0 auto; width:100%; }
    .msg-wrapper.user { flex-direction:row-reverse; }

    .avatar {
      width:32px; height:32px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; flex-shrink:0; font-weight:600;
    }
    .bot-avatar { background:#c96442; color:#fff; }
    .user-avatar { background:#2563eb; color:#fff; }

    .msg-content {
      background:#2a2a2a; padding:12px 16px;
      border-radius:12px; font-size:15px; line-height:1.6;
      max-width:85%;
    }
    .msg-wrapper.user .msg-content {
      background:#2563eb; color:#fff;
      border-radius:12px 4px 12px 12px;
    }
    .msg-wrapper.bot .msg-content {
      border-radius:4px 12px 12px 12px;
    }

    .typing-dots span {
      display:inline-block; width:6px; height:6px;
      border-radius:50%; background:#aaa; margin:0 2px;
      animation:bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay:0.2s; }
    .typing-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-6px); }
    }

    /* Input area */
    #inputarea {
      padding:16px 20px; border-top:1px solid #2a2a2a;
      max-width:800px; width:100%; margin:0 auto;
      padding-bottom:20px;
    }
    #inputbox {
      background:#2a2a2a; border:1px solid #3a3a3a;
      border-radius:12px; padding:12px 50px 12px 16px;
      display:flex; align-items:flex-end; gap:8px; position:relative;
    }
    #inputbox:focus-within { border-color:#555; }
    #input {
      flex:1; background:transparent; border:none; outline:none;
      color:#e0e0e0; font-size:15px; resize:none;
      max-height:200px; line-height:1.5; font-family:inherit;
    }
    #send {
      position:absolute; right:10px; bottom:10px;
      background:#2563eb; border:none; border-radius:8px;
      width:32px; height:32px; color:#fff; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:16px;
    }
    #send:hover { background:#1d4ed8; }
    #send:disabled { background:#333; cursor:not-allowed; }

    #hinttext {
      font-size:11px; color:#555; text-align:center;
      margin-top:8px;
    }

    /* Mobile */
    @media(max-width:640px) {
      #sidebar { display:none; }
      #messages { padding:16px 12px; }
      #inputarea { padding:12px; }
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width:4px; }
    #messages::-webkit-scrollbar-track { background:transparent; }
    #messages::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <button id="newchat" onclick="newChat()">✏️ New Chat</button>

    <div class="sidebar-label">Memory</div>
    <div id="memoryStatus" class="memory-off">
      🔒 Memory off — guest mode
    </div>

    <div class="sidebar-label">Upload File</div>
    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">
      📎 Attach image or docx
    </button>
    <input type="file" id="fileInput" accept=".docx,image/*" onchange="handleFile(event)">
    <div id="fileStatus"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div id="modelname">
        <span class="dot"></span> Llama 70B
      </div>
      <div style="font-size:13px;color:#555;">AI Assistant</div>
    </div>

    <div id="messages">
      <div class="msg-wrapper bot">
        <div class="avatar bot-avatar">A</div>
        <div class="msg-content">Hello! How can I help you today?</div>
      </div>
    </div>

    <div style="max-width:800px;width:100%;margin:0 auto;">
      <div id="inputarea">
        <div id="inputbox">
          <textarea id="input" rows="1" placeholder="Message..."
            oninput="autoResize(this)"></textarea>
          <button id="send" onclick="sendMessage()">↑</button>
        </div>
        <div id="hinttext">AI can make mistakes. Verify important info.</div>
      </div>
    </div>
  </div>

  <script>
    let attachedFile = null;
    let isOwner = false;

    const input = document.getElementById('input');
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      attachedFile = file;
      document.getElementById('fileStatus').innerText = '📄 ' + file.name;
    }

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg && !attachedFile) return;

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send').disabled = true;

      addMessage(msg || '📎 File attached', 'user');
      const typing = addTyping();

      try {
        let reply;
        if (attachedFile) {
          const formData = new FormData();
          formData.append('file', attachedFile);
          formData.append('message', msg || 'Analyze this file');
          const res = await fetch('/upload', { method:'POST', body:formData });
          const data = await res.json();
          reply = data.reply;
          attachedFile = null;
          document.getElementById('fileStatus').innerText = '';
          document.getElementById('fileInput').value = '';
        } else {
          const res = await fetch('/chat', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ message: msg })
          });
          const data = await res.json();
          reply = data.reply;

          // Check if owner key was typed
          if (data.owner === true) {
            isOwner = true;
            document.getElementById('memoryStatus').innerHTML = '🟢 Memory on — saved';
            document.getElementById('memoryStatus').className = 'memory-on';
          }
        }
        typing.remove();
        addMessage(reply, 'bot');
        const msgs = document.getElementById('messages');
        msgs.scrolTop =msgs.scrollHeight;
      } catch(e) {
        typing.remove();
        addMessage('Something went wrong. Try again.', 'bot');
      }

      document.getElementById('send').disabled = false;
    }

    async function newChat() {
      await fetch('/clear', { method:'POST' });
      document.getElementById('messages').innerHTML = `
        <div class="msg-wrapper bot">
          <div class="avatar bot-avatar">A</div>
          <div class="msg-content">Hello! How can I help you today?</div>
        </div>`;
      isOwner = false;
      document.getElementById('memoryStatus').innerHTML = '🔒 Memory off — guest mode';
      document.getElementById('memoryStatus').className = 'memory-off';
    }

    function addMessage(text, role) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${role}`;
      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}-avatar`;
      avatar.innerText = role === 'bot' ? 'A' : 'P';
      const content = document.createElement('div');
      content.className = 'msg-content';
      content.innerText = text;
      wrapper.appendChild(avatar);
      wrapper.appendChild(content);
      document.getElementById('messages').appendChild(wrapper);
      wrapper.scrollIntoView({ behavior:'smooth',block:'end' });
      return wrapper;
    }

    function addTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper bot';
      wrapper.innerHTML = `
        <div class="avatar bot-avatar">A</div>
        <div class="msg-content">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      document.getElementById('messages').appendChild(wrapper);
      wrapper.scrollIntoView({ behavior:'smooth' });
      return wrapper;
    }
  </script>
</body>
</html>
