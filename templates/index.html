<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My AI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f0f0f; color:#fff; font-family:sans-serif;
           display:flex; flex-direction:column; height:100vh; }
    #statusbar { padding:8px 16px; font-size:12px; display:flex;
                 justify-content:space-between; align-items:center;
                 background:#052e16; color:#4ade80; }
    .dot { width:8px; height:8px; border-radius:50%;
           display:inline-block; margin-right:6px; background:#4ade80; }
    #messages { flex:1; overflow-y:auto; padding:16px;
                display:flex; flex-direction:column; gap:12px; }
    .user { background:#2563eb; padding:10px 14px;
            border-radius:18px 18px 4px 18px;
            align-self:flex-end; max-width:80%; }
    .bot { background:#1f1f1f; padding:10px 14px;
           border-radius:18px 18px 18px 4px;
           align-self:flex-start; max-width:80%; line-height:1.5; }
    .typing { opacity:0.5; font-style:italic; }
    #inputbar { display:flex; padding:12px; gap:8px; background:#1a1a1a; }
    #input { flex:1; background:#2a2a2a; border:none; border-radius:24px;
             padding:12px 16px; color:#fff; font-size:16px; outline:none; }
    #send { background:#2563eb; border:none; border-radius:50%;
            width:44px; height:44px; color:#fff; font-size:20px; cursor:pointer; }
    #clearBtn { background:#333; border:none; border-radius:50%;
                width:44px; height:44px; color:#fff;
                font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div id="statusbar">
    <span><span class="dot"></span><span id="modelname">Llama 70B (Groq)</span></span>
    <span>🌐 Online Mode</span>
  </div>
  <div id="messages">
    <div class="bot">Hi! I am your personal AI. Ask me anything.</div>
  </div>
  <div id="inputbar">
    <button id="clearBtn" onclick="clearChat()">🗑</button>
    <input id="input" type="text" placeholder="Message..." />
    <button id="send" onclick="sendMessage()">↑</button>
  </div>
  <script>
    const input = document.getElementById('input');
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      addMessage(msg, 'user');
      const typing = addMessage('Thinking...', 'bot typing');
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      typing.remove();
      addMessage(data.reply, 'bot');
    }

    async function clearChat() {
      await fetch('/clear', { method: 'POST' });
      document.getElementById('messages').innerHTML =
        '<div class="bot">Chat cleared. Ask me anything.</div>';
    }

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = cls;
      div.innerText = text;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView();
      return div;
    }
  </script>
</body>
</html>
